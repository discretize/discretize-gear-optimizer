name: 'Self-hosted Deploy: Cloudflare and Github Pages'

on:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  PAGES_PROJECT_NAME: optimizer

concurrency:
  group: 'deploy'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted]

    container:
      image: ghcr.io/${{ github.repository }}-build:main
      credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      deployments: write
      pages: write
      id-token: write
      packages: read
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: pnpm install

      - name: Compile WASM
        run: pnpm wasm
        env:
          PATH: /home/discretize/.cargo/bin/:/usr/local/bin:/usr/bin:/bin

      - parallel:
        - name: Build for Cloudflare
          run: pnpm build-cf --outDir dist-cf
        - name: Build for Github Pages
          run: pnpm build-gh --outDir dist-gh

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v4
        background: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN_1 }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_1 }}
          command: pages deploy dist-cf --project-name=${{ env.PAGES_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Github Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist-gh'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
